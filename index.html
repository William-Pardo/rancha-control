<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rancha Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class', // Habilitar modo oscuro
        theme: {
          extend: {
            colors: {
              border: 'rgb(var(--border) / <alpha-value>)',
              input: 'rgb(var(--input) / <alpha-value>)',
              ring: 'rgb(var(--ring) / <alpha-value>)',
      
              background: 'rgb(var(--background) / <alpha-value>)',
              foreground: 'rgb(var(--foreground) / <alpha-value>)',
      
              primary: 'rgb(var(--primary) / <alpha-value>)',
              'primary-hover': 'rgb(var(--primary-hover) / <alpha-value>)',
              'primary-foreground': 'rgb(var(--primary-foreground) / <alpha-value>)',
      
              secondary: 'rgb(var(--secondary) / <alpha-value>)',
              'secondary-foreground': 'rgb(var(--secondary-foreground) / <alpha-value>)',
      
              destructive: 'rgb(var(--destructive) / <alpha-value>)',
              'destructive-hover': 'rgb(var(--destructive-hover) / <alpha-value>)',
              'destructive-foreground': 'rgb(var(--destructive-foreground) / <alpha-value>)',
      
              accent: 'rgb(var(--accent) / <alpha-value>)',
              'accent-hover': 'rgb(var(--accent-hover) / <alpha-value>)',
              'accent-foreground': 'rgb(var(--accent-foreground) / <alpha-value>)',
              
              muted: 'rgb(var(--muted) / <alpha-value>)',
              'muted-foreground': 'rgb(var(--muted-foreground) / <alpha-value>)',
              
              card: 'rgb(var(--card) / <alpha-value>)',
              'card-foreground': 'rgb(var(--card-foreground) / <alpha-value>)',
            },
            borderRadius: {
              card: '0.75rem', // xl
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              card: '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)', // shadow-md
            }
          },
        },
      };
    </script>
    <style>
      :root {
        --border: 229 231 235; /* gray-200 */
        --input: 209 213 219; /* gray-300 */
        --ring: 79 70 229;   /* indigo-600 */
        --background: 249 250 251; /* gray-50 */
        --foreground: 17 24 39; /* gray-900 */
        --primary: 79 70 229; /* indigo-600 */
        --primary-hover: 67 56 202; /* indigo-700 */
        --primary-foreground: 249 250 251; /* gray-50 */
        --secondary: 243 244 246; /* gray-100 */
        --secondary-foreground: 31 41 55; /* gray-800 */
        --destructive: 220 38 38; /* red-600 */
        --destructive-hover: 185 28 28; /* red-700 */
        --destructive-foreground: 254 242 242; /* red-50 */
        --accent: 22 163 74; /* green-600 */
        --accent-hover: 21 128 61; /* green-700 */
        --accent-foreground: 240 253 244; /* green-50 */
        --muted: 243 244 246; /* gray-100 */
        --muted-foreground: 107 114 128; /* gray-500 */
        --card: 255 255 255;
        --card-foreground: 17 24 39;
      }

      .dark {
        --border: 55 65 81; /* gray-700 */
        --input: 75 85 99; /* gray-600 */
        --ring: 129 140 248;   /* indigo-400 */
        --background: 17 24 39; /* gray-900 */
        --foreground: 249 250 251; /* gray-50 */
        --primary: 99 102 241; /* indigo-500 */
        --primary-hover: 129 140 248; /* indigo-400 */
        --primary-foreground: 249 250 251; /* gray-50 */
        --secondary: 31 41 55; /* gray-800 */
        --secondary-foreground: 229 231 235; /* gray-200 */
        --destructive: 248 113 113; /* red-400 */
        --destructive-hover: 252 165 165; /* red-300 */
        --destructive-foreground: 17 24 39; /* gray-900 */
        --accent: 74 222 128; /* green-400 */
        --accent-hover: 134 239 172; /* green-300 */
        --accent-foreground: 17 24 39; /* gray-900 */
        --muted: 55 65 81; /* gray-700 */
        --muted-foreground: 156 163 175; /* gray-400 */
        --card: 31 41 55; /* gray-800 */
        --card-foreground: 249 250 251; /* gray-50 */
      }

      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
