name: Deploy backend to Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [ feature/backend-gemini-proxy, main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push image
        run: |
          gcloud builds submit backend --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/rancha-backend:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy rancha-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/rancha-backend:latest \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
